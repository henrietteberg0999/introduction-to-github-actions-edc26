name: Workflow of exercise 3
run-name: This is a variable workflow # Optional

# Events triggering the workflow
on: [push]
# Group of jobs to run as part of the workflow

jobs:
  job_id:
    runs-on: ubuntu-latest
    env:
      JobVariable: "This is a job variable"
    steps:
      - run: echo "${{ env.JobVariable }}"
   